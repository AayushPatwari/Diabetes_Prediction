<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Diabetes Risk Predictor</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="card">
  <div class="header">
    <h1>🩺 Diabetes Predictor</h1>
    <p>Your health, our priority</p>
  </div>

  <div class="inputs">
    <input id="preg" type="number" placeholder="👶 Pregnancies">
    <input id="glucose" type="number" placeholder="🧪 Glucose Level">
    <input id="bp" type="number" placeholder="💓 Blood Pressure">
    <input id="skin" type="number" placeholder="📏 Skin Thickness">
    <input id="insulin" type="number" placeholder="💉 Insulin">
    <input id="bmi" type="number" step="0.1" placeholder="⚖️ BMI">
    <input id="dpf" type="number" step="0.01" placeholder="🧬 DPF">
    <input id="age" type="number" placeholder="🎂 Age">
  </div>

  <button onclick="predict()">Predict Health Status</button>

  <div id="result" class="result"></div>

  <div class="footer">
    <small>🔒 Secure • Medical Grade Prediction</small>
  </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
